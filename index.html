<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马佳源 - 数字名片</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- 头像区域 -->
            <div class="avatar-section">
                <div class="avatar">
                    <img src="images/photo.jpg" alt="马佳源的照片">
                </div>
            </div>

            <!-- 基本信息 -->
            <div class="info-section">
                <h1 class="name">马佳源</h1>
                <p class="student-id">学号：2362120121</p>
                <p class="major">计算机科学与技术</p>
                <p class="contact">联系方式：19857670795</p>
            </div>

            <!-- 个性签名 -->
            <div class="signature-section">
                <p class="signature">跳出三贷之外，不在五险之中</p>
            </div>

            <!-- 自我介绍 -->
            <div class="about-section">
                <h2>关于我</h2>
                <p class="about-text">
                    <!-- 请在此处填写您的自我介绍，不少于 100 字 -->
                </p>
            </div>

            <!-- 兴趣标签 -->
            <div class="interests-section">
                <h2>兴趣爱好</h2>
                <div class="tags">
                    <span class="tag interest-tag">📖 看小说</span>
                    <span class="tag interest-tag">📺 看直播</span>
                    <span class="tag interest-tag">🎮 玩游戏</span>
                </div>
            </div>

            <!-- 技能标签 -->
            <div class="skills-section">
                <h2>技能特长</h2>
                <div class="tags">
                    <span class="tag skill-tag">🍚 饭点会饿</span>
                    <span class="tag skill-tag">🍔 饿了会找吃的</span>
                    <span class="tag skill-tag">😴 吃了会睡</span>
                </div>
            </div>

            <!-- 外部链接 -->
            <div class="links-section">
                <h2>相关链接</h2>
                <a href="#" class="external-link" target="_blank">
                    <!-- 请在此处填写您的外部链接地址 -->
                    个人主页
                </a>
            </div>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 马佳源。All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
